        <link href="/static/css/bootstrap.min.css" rel="stylesheet">

        <link href="/static/css/bootstrap-icons.css" rel="stylesheet">

        <link href="/static/css/templatemo-festava-live.css" rel="stylesheet">

    </head>
    
    <body>

        <main>

            <header class="site-header">
                <div class="container">
                    <div class="row">
                        
                        <div class="col-lg-12 col-12 d-flex flex-wrap">
                            <p class="d-flex me-4 mb-0">
                                <i class="bi-person custom-icon me-2"></i>
                                <strong class="text-dark">Hai !</strong>
                            </p>
                        </div>

                    </div>
                </div>
               

            </header>


            <nav class="navbar navbar-expand-lg">
                <div class="container">
                    <a class="navbar-brand" href="../templates/index.html">
                        JST
                    </a>

                    <a href="ticket.html" class="btn custom-btn d-lg-none ms-auto me-4">Buy Ticket</a>
    
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav align-items-lg-center ms-auto me-lg-5">
                            <li class="nav-item">
                                <a class="nav-link click-scroll" href="{{ url_for('index') }}#section_1">Home</a>
                            </li>
    
                            <li class="nav-item">
                                <a class="nav-link click-scroll" href="{{ url_for('index') }}#section_2">About</a>
                            </li>
    
                            <li class="nav-item">
                                <a class="nav-link click-scroll" href="{{ url_for('index') }}#section_3">Cara</a>
                            </li>

                            <li class="nav-item">
                                <a class="nav-link click-scroll" href="{{ url_for('index') }}#section_4">Anggota</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>


            <section class="input-section section-padding">
                <div class="section-overlay"></div>
            
                <div class="container">
                    <div class="row justify-content-center">
            
                        <div class="col-lg-8 col-md-10 col-12">
                            <form class="custom-form ticket-form p-4 shadow-lg rounded bg-white" action="{{ url_for('deteksi') }}" method="post" enctype="multipart/form-data">

                                <h2 class="text-center mb-4 text-dark">Unggah Gambar Daun Cabai</h2>
            
                            <!-- Single Image Upload -->
                            <div class="mb-4">
                                 <label for="single-image" class="form-label fw-bold">Unggah Gambar Tunggal</label>
                                 <input class="form-control" type="file" id="single-image" name="image" accept="image/*">
                            </div>


                            <!-- Folder Upload -->
                            
                            <div class="mb-4">
                                <label for="image-folder" class="form-label fw-bold">Unggah Folder Gambar</label>
                                <input class="form-control" type="file" id="image-folder" name="image" accept="image/*" webkitdirectory directory multiple>
                                <small class="text-muted">Pastikan folder hanya berisi gambar</small>
                            </div>
           
                            <!-- Loading Spinner -->
                            <div class="text-center mt-3" id="loading" style="display:none;">
                                <div class="spinner-border text-success" role="status"></div>
                                <p class="mt-2 text-dark">Memproses gambar... Mohon tunggu</p>
                            </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-success px-5 py-2">Deteksi</button>
                                </div>
                            </form>
                            

                        </div>
                            
                    </div>
                </div>
            </section>
            
        </main>

         <script>
             // Tampilkan spinner saat form disubmit
             document.querySelector('form').addEventListener('submit', function () {
                 document.getElementById('loading').style.display = 'block';
             });
         </script>
